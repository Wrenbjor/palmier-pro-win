[package]
name = "palmier-tools"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
publish.workspace = true

[dependencies]
palmier-model = { path = "../palmier-model" }
# The edit engines (Overwrite/Ripple/Snap) + named-undo history the mutating tool
# bodies call (E7-S6..S10). Read tools (this story, E7-S2/S3) don't mutate, but the
# executor owns the editor handle (EditorState = MediaLibrary + History<Timeline>),
# so the deps land now for the dispatch seam.
palmier-edit = { path = "../palmier-edit" }
palmier-history = { path = "../palmier-history" }
# E7-S10 library tools: `import_media` (path/bytes) goes through palmier-media's
# import orchestration (`add_media_asset` / `import_folder`) + `classify_path`.
palmier-media = { path = "../palmier-media" }
# E9-S11: the 4 generate tool bodies validate params against the live model
# catalog and submit through palmier-gen. The tool bodies do pure validation +
# gating + dispatch to a `GenerationGateway` seam (so they're unit-testable with a
# mock); the heavy async lifecycle/transport stays in palmier-gen, wired by the
# host (palmier-tauri). Default features OFF here â€” palmier-tools needs only the
# catalog/params/validate types, not the WS `convex` client, to build + test.
palmier-gen = { path = "../palmier-gen", default-features = false }
# E10-S7 caption tools: `add_captions` drives palmier-edit's `generate_captions`
# orchestration with the cache-vs-bypass `transcribe` closure wired here, and both
# `add_captions` + `get_transcript` read/write the on-device transcript cache. The
# whisper engine (synchronous) + `TranscriptCache` (async singleton) live in
# palmier-transcribe; `FontRegistry`/`TextLayout` (caption measurement) in palmier-text.
palmier-transcribe = { path = "../palmier-transcribe" }
palmier-text = { path = "../palmier-text" }
# E11-S10 `search_media`: the shared dispatcher composes the merged Epic 11 search
# pieces â€” the E11-S6 `SearchIndexCoordinator` + `VisualStatus` (visual scope, via the
# `VisualSearchGateway` seam the host wires), and `TranscriptSearch` (spoken scope,
# sync, disk-only). Default features OFF: the tool layer needs only the search TYPES
# (`Hit`/`TranscriptHit`/`VisualStatus`) + the sync transcript search, NOT the `ort`
# ONNX encode â€” the real visual encoder is wired behind the gateway by the host
# (`palmier-tauri`). The additive `ort` feature below forwards to palmier-search/ort so
# a `--features ort` build of this crate brings the live encoder into the graph (for the
# gated SM-12 visual test + the host build).
palmier-search = { path = "../palmier-search", default-features = false }
# `add_captions` mints the shared caption-group UUID for the placement batch.
uuid = { workspace = true, features = ["v4"] }
# The cache singleton (`TranscriptCache::shared`) is async (tokio `OnceCell`) and the
# whisper transcribe call BLOCKS (`whisper full()`), so the sync tool body builds a
# small current-thread runtime to `block_on` the cache and runs each transcription via
# `spawn_blocking` (E10-S7 cache-vs-bypass + blocking-thread requirement).
tokio = { workspace = true, features = ["rt", "rt-multi-thread", "sync"] }
serde_json.workspace = true
# `uuidRegex` literal port â€” the same `[0-9A-Fa-f]{8}-â€¦` pattern the reference
# `ToolExecutor+ShortId.swift` uses to find known UUIDs in result text and rewrite
# them to their short prefix. ShortId itself compares id strings directly (no UUID
# parsing), so the `uuid` crate isn't needed here â€” `regex` is the only addition.
regex.workspace = true

# E7-S5 `inspect_timeline`: the wgpu compositor frame render â†’ base64 PNG path, behind
# the `gpu-inspect` feature exactly like E5-S8's `wgpu-compositor` gate (reconciliation
# #22/#23). OFF by default so the dispatcher + cap/sampling math build + test GPU-free;
# turning it on pulls the engine's GPU compositor + the `png` encoder. `palmier-engine`
# is optional so the GPU stack is only in the graph when the feature is requested.
palmier-engine = { path = "../palmier-engine", optional = true }
png = { version = "0.17", default-features = false, optional = true }

[features]
default = []
# Compile the GPU compositor path for `inspect_timeline` (real composited frames). With
# the feature off the tool reports rendering-unavailable and lists the sampled frames.
gpu-inspect = ["dep:palmier-engine", "palmier-engine/wgpu-compositor", "dep:png"]
# E11-S10: forward to palmier-search's `ort` feature so the live SigLIP2 encoder + the
# real visual `search_media` path come into the graph (the gated SM-12 visual test +
# the host build). Additive â€” the default build stays ONNX/DLL-free (visual = disabled).
ort = ["palmier-search/ort"]
